<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>AgentGlance Remote</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <div id="pairing-screen" class="screen">
            <div class="pairing-card">
                <h1>AgentGlance</h1>
                <p>Enter the 6-digit pair code from your Mac</p>
                <div id="code-inputs"></div>
                <button id="pair-btn" class="btn btn-primary" disabled>Connect</button>
                <p id="pair-error" class="error" hidden></p>
            </div>
        </div>
        <div id="main-screen" class="screen" hidden>
            <header>
                <h2>AgentGlance</h2>
                <span id="debug-label" style="font-size:10px;color:#555;font-family:monospace"></span>
                <div id="connection-dot" class="dot dot-green"></div>
                <button id="settings-btn" class="header-btn" aria-label="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </header>
            <div id="settings-panel" hidden>
                <div class="settings-content">
                    <div class="settings-row">
                        <span>Keep screen on</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="wakelock-toggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <button id="disconnect-btn" class="btn btn-deny btn-sm" style="width:100%;margin-top:12px">Disconnect</button>
                </div>
            </div>
            <div id="loading-state">
                <div class="spinner loading-spinner"></div>
                <p>Loading sessions...</p>
            </div>
            <div id="sessions"></div>
            <div id="empty-state" hidden>
                <p>No active sessions</p>
            </div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
